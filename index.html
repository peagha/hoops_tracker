<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111827">
<title>Hoops Tracker</title>
<link rel="stylesheet" href="style.css?v=2026.06.16-0828">
</head>
<body>
<header class="app-header">
  <h1>🏀 Hoops Tracker</h1>
</header>

<main id="view-play" class="view active">
  <div id="play-setup">
    <h2>Start a game</h2>
    <p class="muted">Name your teams and assign players.</p>
    <div class="team-names">
      <input id="team-a-name-input" type="text" value="Team A" maxlength="20" aria-label="Team A name">
      <span class="vs">vs</span>
      <input id="team-b-name-input" type="text" value="Team B" maxlength="20" aria-label="Team B name">
    </div>
    <div id="setup-players-list" class="assign-list"></div>
    <div class="setup-actions">
      <button id="shuffle-btn" class="btn-secondary shuffle-btn">⇌ Shuffle Teams</button>
      <button id="start-game-btn" class="btn-primary">Start Game</button>
    </div>
  </div>

  <div id="play-summary" class="hidden">
    <h2>Game Over</h2>
    <div id="summary-content"></div>
    <button id="summary-done-btn" class="btn-primary">New Game</button>
  </div>

  <div id="play-active" class="hidden">
    <div class="scoreboard">
      <div class="scoreboard-team">
        <div class="scoreboard-name" id="team-a-name"></div>
        <div class="scoreboard-score" id="team-a-score">0</div>
      </div>
      <div class="scoreboard-sep">
        <span>–</span>
        <span class="game-clock" id="game-clock">0:00</span>
      </div>
      <div class="scoreboard-team">
        <div class="scoreboard-name" id="team-b-name"></div>
        <div class="scoreboard-score" id="team-b-score">0</div>
      </div>
    </div>
    <div class="quick-actions">
      <div class="quick-team-label" id="qa-label-a"></div>
      <div class="quick-team-label" id="qa-label-b"></div>
      <button type="button" class="quick-btn" data-team="A" data-points="3">+3</button>
      <button type="button" class="quick-btn" data-team="B" data-points="3">+3</button>
      <button type="button" class="quick-btn" data-team="A" data-points="2">+2</button>
      <button type="button" class="quick-btn" data-team="B" data-points="2">+2</button>
    </div>
    <div id="feed-scroll" class="feed-scroll">
      <div id="feed" class="feed"></div>
      <button id="discard-game-btn" class="btn-text danger">Discard game</button>
    </div>
    <div class="active-toolbar">
      <button id="undo-btn" class="btn-secondary">↩ Undo</button>
      <button id="end-game-btn" class="btn-primary">End Game</button>
    </div>
  </div>
</main>

<div id="picker-overlay" class="picker-overlay hidden">
  <div class="picker-sheet">
    <div class="picker-title" id="picker-title"></div>
    <div id="picker-list" class="picker-list"></div>
    <button type="button" id="picker-cancel" class="btn-secondary">Cancel</button>
  </div>
</div>

<main id="view-players" class="view">
  <h2>Players</h2>
  <ul id="players-list" class="players-list"></ul>
  <form id="add-player-form" class="add-player-form">
    <input id="new-player-name" type="text" placeholder="Player name" autocomplete="off" required>
    <button type="submit" class="btn-primary">Add</button>
  </form>
</main>

<main id="view-history" class="view">
  <h2>History</h2>
  <div id="history-list"></div>
</main>

<main id="view-menu" class="view">
  <h2>Menu</h2>

  <section class="menu-section">
    <h3 class="menu-section-heading">Backup &amp; Share</h3>
    <p class="muted">Export everything (players + game history) as a JSON file, or share it. Importing replaces your current data.</p>
    <button id="export-btn" class="btn-primary">Export / Share Backup</button>
    <label class="btn-secondary file-btn">
      Import Backup
      <input id="import-input" type="file" accept="application/json">
    </label>
  </section>

  <section class="menu-section">
    <h3 class="menu-section-heading">Admin</h3>
    <button id="bootstrap-players-btn" class="btn-secondary" style="width:100%;margin-bottom:8px;">Add Test Players</button>
    <button id="clear-history-btn" class="btn-text danger">Clear Game History</button>
    <button id="clear-players-btn" class="btn-text danger">Clear Players</button>
    <button id="reset-app-btn" class="btn-text danger">Clear Everything</button>
  </section>

  <section class="menu-section">
    <h3 class="menu-section-heading">Version</h3>
    <p class="muted">Build <span id="app-version"></span></p>
  </section>
</main>

<nav class="bottom-nav">
  <button data-view="play" class="nav-btn active">▶️<span>Play</span></button>
  <button data-view="players" class="nav-btn">👤<span>Players</span></button>
  <button data-view="history" class="nav-btn">📜<span>History</span></button>
  <button data-view="menu" class="nav-btn">☰<span>Menu</span></button>
</nav>

<script>window.APP_VERSION = "2026.06.16-0828";</script>
<script src="app.js?v=2026.06.16-0828"></script>
</body>
</html>
